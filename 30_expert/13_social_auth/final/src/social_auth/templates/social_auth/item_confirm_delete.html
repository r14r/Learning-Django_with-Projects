{% extends "base.html" %}
{% block title %}Delete Item{% endblock %}
{% block content %}
<h1>Delete "{{ object.title }}"?</h1>
<p>This action cannot be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'social_auth:detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
