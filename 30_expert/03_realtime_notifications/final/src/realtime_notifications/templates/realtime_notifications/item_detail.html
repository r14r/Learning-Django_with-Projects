{% extends "base.html" %}
{% block title %}{{ object.title }}{% endblock %}
{% block content %}
<h1>{{ object.title }}</h1>
<p class="text-muted">By {{ object.author }} on {{ object.created_at|date:"Y-m-d" }}</p>
<p>{{ object.description }}</p>
<div class="mt-3">
  <a href="{% url 'realtime_notifications:list' %}" class="btn btn-outline-secondary">Back</a>
  {% if user == object.author %}
  <a href="{% url 'realtime_notifications:update' object.pk %}" class="btn btn-warning">Edit</a>
  <a href="{% url 'realtime_notifications:delete' object.pk %}" class="btn btn-danger">Delete</a>
  {% endif %}
</div>
{% endblock %}
