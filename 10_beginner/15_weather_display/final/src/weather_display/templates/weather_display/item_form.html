{% extends "base.html" %}
{% block title %}{% if object %}Edit{% else %}New{% endif %} Item{% endblock %}
{% block content %}
<h1>{% if object %}Edit Item{% else %}New Item{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'weather_display:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
