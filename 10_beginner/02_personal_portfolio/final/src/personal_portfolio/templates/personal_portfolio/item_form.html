{% extends "base.html" %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Project{% endblock %}
{% block content %}
<h1>{% if object %}Edit Project{% else %}Add Project{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'personal_portfolio:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
