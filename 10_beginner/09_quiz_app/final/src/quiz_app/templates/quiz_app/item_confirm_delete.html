{% extends "base.html" %}
{% block title %}Delete Quiz{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <h1>Delete "{{ object.title }}"?</h1>
    <p class="text-muted">This will permanently remove the quiz and all its questions.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'quiz_app:list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
