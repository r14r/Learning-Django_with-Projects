<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Quiz App{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">🧠 Quiz App</a>
    <div class="d-flex gap-2">
      <a href="{% url 'quiz_app:list' %}" class="btn btn-outline-light btn-sm">Quizzes</a>
      {% if user.is_authenticated %}
      <a href="{% url 'quiz_app:create' %}" class="btn btn-outline-success btn-sm">+ New Quiz</a>
      <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
      {% else %}
      <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
      {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
