<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Contact Us{% endblock %}</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">✉️ Contact Form</a>
    <div class="d-flex gap-2">
      <a href="{% url 'contact_form:list' %}" class="btn btn-outline-light btn-sm">Contact</a>
      {% if user.is_authenticated %}
      <a href="{% url 'contact_form:inbox' %}" class="btn btn-outline-light btn-sm">Inbox</a>
      {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
</body>
</html>
