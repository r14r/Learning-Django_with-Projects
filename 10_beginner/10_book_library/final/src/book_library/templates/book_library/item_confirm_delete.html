{% extends "base.html" %}
{% block title %}Delete Book{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <h1>Delete "{{ object.title }}"?</h1>
    <p class="text-muted">by {{ object.author_name }}</p>
    <p>This action cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'book_library:detail' object.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
