{% extends "base.html" %}
{% block title %}Delete Todo{% endblock %}
{% block content %}
<h1>Delete "{{ object.title }}"?</h1>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'todo_list:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
