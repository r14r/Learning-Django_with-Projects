{% extends "base.html" %}
{% block title %}{% if object %}Edit{% else %}New{% endif %} Todo{% endblock %}
{% block content %}
<h1>{% if object %}Edit Todo{% else %}New Todo{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'todo_list:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
