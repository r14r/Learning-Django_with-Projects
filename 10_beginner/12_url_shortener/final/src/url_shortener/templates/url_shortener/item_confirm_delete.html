{% extends "base.html" %}
{% block title %}Delete Short URL{% endblock %}
{% block content %}
<h1>Delete short URL "{{ object.short_code }}"?</h1>
<p class="text-muted">Original: <a href="{{ object.original_url }}">{{ object.original_url }}</a></p>
<p>This action cannot be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'url_shortener:my-urls' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
