{% extends "base.html" %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Course{% endblock %}
{% block content %}
<h1>{% if course %}Add Grade to {{ course.name }}{% elif object %}Edit Course{% else %}Add Course{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'grade_tracker:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
