{% extends "base.html" %}
{% block title %}{% if object %}Edit Note{% else %}New Note{% endif %}{% endblock %}
{% block content %}
<h1>{% if object %}Edit Note{% else %}New Note{% endif %}</h1>
<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Title</label>
    {{ form.title }}
  </div>
  <div class="mb-3">
    <label class="form-label">Content</label>
    {{ form.content }}
  </div>
  <div class="mb-3">
    <label class="form-label">Card Color</label>
    {{ form.color }}
  </div>
  <div class="mb-3 form-check">
    {{ form.pinned }}
    <label class="form-check-label">Pinned</label>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'notes_app:list' %}" class="btn btn-outline-secondary">Cancel</a>
</form>
{% endblock %}
